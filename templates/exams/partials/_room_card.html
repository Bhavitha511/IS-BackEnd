<div class="col-span-1">
  <div class="relative h-full rounded-xl border border-slate-200 bg-white p-4 text-center text-sm shadow-sm">
    <h3 class="text-sm font-semibold text-slate-900">{{ hall.name }}</h3>
    {% if hall.floor %}
      <div class="mt-1 text-xs text-slate-500">Floor: {{ hall.floor }}</div>
    {% endif %}
    {% if tooltip %}
      <div class="mt-3 inline-flex items-center gap-1 rounded-full bg-sky-50 px-2.5 py-1 text-[11px] font-medium text-sky-700 ring-1 ring-sky-100">
        Cabins: {{ tooltip }}
      </div>
    {% else %}
      <div class="mt-3 text-xs text-slate-400">
        No faculty cabins mapped
      </div>
    {% endif %}
  </div>
</div>
