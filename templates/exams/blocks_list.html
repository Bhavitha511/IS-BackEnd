{% extends 'base.html' %}

{% block title %}Blocks Overview{% endblock %}

{% block content %}
<div class="flex flex-col gap-4">
  <h1 class="text-2xl font-semibold tracking-tight text-slate-900">Blocks</h1>
  <div class="grid gap-3 sm:grid-cols-3 lg:grid-cols-4">
    {% for block in blocks %}
      <a href="{% url 'exams:block_detail' block %}"
         class="group rounded-xl border border-slate-200 bg-white p-4 text-center text-sm font-medium text-slate-800 shadow-sm hover:border-primary-400 hover:bg-primary-50/60">
        <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-primary-50 text-primary-700 text-lg font-semibold mb-2">
          {{ block }}
        </div>
        <div class="text-xs uppercase tracking-wide text-slate-500">Block</div>
      </a>
    {% empty %}
      <p class="text-sm text-slate-500">
        No blocks defined yet. Add rooms in <strong>Manage Blocks / Rooms</strong> first.
      </p>
    {% endfor %}
  </div>
</div>
{% endblock %}
