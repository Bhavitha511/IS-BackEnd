{% extends 'base.html' %}

{% block title %}Reset Password with OTP{% endblock %}

{% block content %}
<div class="flex items-center justify-center">
  <div class="w-full max-w-md">
    <div class="mb-6 text-center">
      <h1 class="text-2xl font-semibold tracking-tight text-slate-900">Reset your password</h1>
      <p class="mt-2 text-sm text-slate-600">
        Enter the OTP sent to your email along with a new password to complete the reset.
      </p>
    </div>

    <form method="post" class="space-y-4 rounded-xl border border-slate-200 bg-white px-6 py-5 shadow-sm">
      {% csrf_token %}

      <div class="space-y-1.5">
        <label for="email" class="block text-sm font-medium text-slate-700">Email</label>
        <input type="email"
               name="email"
               id="email"
               value="{{ email|default:'' }}"
               required
               class="block w-full rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-900 shadow-sm placeholder-slate-400 focus:border-primary-600 focus:outline-none focus:ring-1 focus:ring-primary-600">
      </div>

      <div class="space-y-1.5">
        <label for="code" class="block text-sm font-medium text-slate-700">OTP code</label>
        <input type="text"
               name="code"
               id="code"
               required
               class="block w-full rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-900 shadow-sm placeholder-slate-400 focus:border-primary-600 focus:outline-none focus:ring-1 focus:ring-primary-600">
      </div>

      <div class="space-y-1.5">
        <label for="new_password" class="block text-sm font-medium text-slate-700">New password</label>
        <input type="password"
               name="new_password"
               id="new_password"
               required
               class="block w-full rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-900 shadow-sm placeholder-slate-400 focus:border-primary-600 focus:outline-none focus:ring-1 focus:ring-primary-600">
      </div>

      <div class="space-y-2">
        <button type="submit"
                class="inline-flex w-full items-center justify-center rounded-md bg-emerald-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-emerald-700">
          Reset password
        </button>
        <a href="{% url 'accounts:login' %}"
           class="inline-flex w-full items-center justify-center rounded-md border border-slate-300 bg-white px-4 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50">
          Back to login
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
