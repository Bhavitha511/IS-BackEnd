<tr>
  <td class="px-2 py-1">
    <input type="text" name="employee_id" class="form-input w-full rounded-md border border-slate-300 px-2 py-1 text-xs" required>
  </td>
  <td class="px-2 py-1">
    <input type="text" name="first_name" class="form-input w-full rounded-md border border-slate-300 px-2 py-1 text-xs" required>
  </td>
  <td class="px-2 py-1">
    <input type="text" name="last_name" class="form-input w-full rounded-md border border-slate-300 px-2 py-1 text-xs" required>
  </td>
  <td class="px-2 py-1">
    <input type="email" name="email" class="form-input w-full rounded-md border border-slate-300 px-2 py-1 text-xs" required>
  </td>
  <td class="px-2 py-1">
    <select name="department" class="form-select w-full rounded-md border border-slate-300 px-2 py-1 text-xs" required>
      <option value="">-- Select Department --</option>
      {% for dept in departments %}
        <option value="{{ dept.id }}">{{ dept.code }} - {{ dept.name }}</option>
      {% endfor %}
    </select>
  </td>
  <td class="px-2 py-1">
    <input type="text" name="cabin_block" class="form-input w-full rounded-md border border-slate-300 px-2 py-1 text-xs">
  </td>
  <td class="px-2 py-1">
    <input type="text" name="cabin_room" class="form-input w-full rounded-md border border-slate-300 px-2 py-1 text-xs">
  </td>
  <td class="px-2 py-1">
    <input type="text" name="phone_number" class="form-input w-full rounded-md border border-slate-300 px-2 py-1 text-xs">
  </td>
  <td class="px-2 py-1 text-center">
    <button type="button"
            class="delete-row inline-flex h-7 w-7 items-center justify-center rounded-full border border-red-200 bg-white text-xs font-semibold text-red-700 hover:bg-red-50">
      ×
    </button>
  </td>
</tr>
